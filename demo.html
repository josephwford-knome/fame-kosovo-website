<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FAME Demo — coming online</title>
<link rel="icon" type="image/png" href="./favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{ --cream:#F5F1EC; --ink:#15110F; --muted:#5C534D; --red:#CE1126; --red-deep:#9E1420; --gold:#BE9B4E; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; display:grid; place-items:center; text-align:center;
    background:var(--cream); color:var(--ink); font-family:"Inter",system-ui,sans-serif; padding:2rem; }
  .eagle{ height:64px; margin:0 auto 1.4rem; }
  .eyebrow{ font-family:"Archivo",sans-serif; font-weight:800; font-size:.72rem; letter-spacing:.28em;
    text-transform:uppercase; color:var(--red-deep); margin:0 0 1rem; }
  h1{ font-family:"Archivo",sans-serif; font-weight:900; letter-spacing:-.015em;
    font-size:clamp(2rem,6vw,3.2rem); margin:0 0 1rem; line-height:1.05; }
  h1 .a{ color:var(--red); }
  p{ color:var(--muted); max-width:46ch; margin:0 auto 2rem; font-size:1.05rem; line-height:1.55; }
  a.btn{ font-family:"Archivo",sans-serif; font-weight:800; font-size:.92rem; text-decoration:none;
    display:inline-flex; align-items:center; gap:.5em; padding:.9em 1.5em; border-radius:999px;
    background:var(--red); color:#fff; box-shadow:0 10px 26px -10px rgba(206,17,38,.7); }
  .tag{ margin-top:2.5rem; font-family:"Archivo",sans-serif; font-weight:800; letter-spacing:.1em;
    text-transform:uppercase; font-size:.72rem; color:var(--gold); }
</style>
</head>
<body>
  <main>
    <img class="eagle" src="./fame_eagle.png" alt="FAME eagle" />
    <p class="eyebrow">Future Albanian Minds Empowered</p>
    <h1>The F<span class="a">A</span>ME demo<br>lands here.</h1>
    <p>This is the home for the interactive FAME demo. Drop the demo build into this
      <code>/demo/</code> folder and it will go live at this address.</p>
    <a class="btn" href="./index.html">← Back to fame-kosovo.org</a>
    <div class="tag">From Hunger to Recognition</div>
  </main>
</body>
</html>
